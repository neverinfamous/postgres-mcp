name: Publish to NPM

# npm publish is gated behind Docker security checks:
# - Triggered by docker-publish.yml after Docker Scout + image push succeeds
# - Manual dispatch available as fallback
on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match package.json)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@neverinfamous/postgres-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if version already published
        id: check
        run: |
          PKG_VERSION="${{ steps.version.outputs.version }}"
          PUBLISHED=$(npm view @neverinfamous/postgres-mcp version 2>/dev/null || echo "none")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $PKG_VERSION (current published: $PUBLISHED)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: steps.check.outputs.skip != 'true'
        run: |
          sleep 10
          PUBLISHED=$(npm view @neverinfamous/postgres-mcp version)
          EXPECTED="${{ steps.version.outputs.version }}"
          echo "Published: $PUBLISHED | Expected: $EXPECTED"
          if [ "$PUBLISHED" != "$EXPECTED" ]; then
            echo "::warning::Version mismatch after publish"
          fi
